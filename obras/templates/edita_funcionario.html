{% load static %}
<link rel="stylesheet" href="{% static 'style_obras.css' %}" />

<div class="wrap">{% include 'partial_messages.html' %}
  <div class="card">
    <div class="header">
      <div class="header-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="6" r="3.5" fill="#854F0B" opacity=".8"/>
          <path d="M2 15c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" fill="none" opacity=".5"/>
        </svg>
      </div>
      <div>
        <div class="header-title">Editar Funcionário</div>
        <div class="header-sub">{{ funcionario.NOME }}</div>
      </div>
    </div>
    <div class="divider" style="margin-top: 0;"></div>

    <div class="tab-row">
      <button type="button" id="btn-dados-edit" class="tab-btn tab-ativo">Dados Pessoais</button>
      <button type="button" id="btn-login-edit" class="tab-btn">Dados de Login</button>
    </div>

    <form id="form-edita-func" hx-post="{% url 'salva_edicao_funcionario' %}" hx-target="#conteudo-dinamico" hx-indicator="#btn-salvar-alteracoes" hx-trigger="confirmar-edita-func">
      {% csrf_token %}
      <input type="hidden" name="form_token" value="{{ form_token }}">
      <input type="hidden" name="CPF_ORIGINAL" value="{{ funcionario.CPF }}">

      <div id="aba-dados-edit">
        <div class="form-grid">
          <div class="field full">
            <label>Nome Completo</label>
            <input type="text" name="NOME" value="{{ funcionario.NOME }}" style="text-transform: uppercase" />
          </div>

          <div class="field">
            <label>Data de Nascimento</label>
            <input type="date" name="DATA_NASCIMENTO" value="{{ funcionario.DATA_NASCIMENTO }}" />
          </div>

          <div class="field">
            <label>RG</label>
            <input type="text" name="RG" id="rg-edita-func" value="{{ funcionario.RG }}" maxlength="12" />
          </div>
        </div>

        <div class="btn-row" style="margin-top: 1.25rem;">
          <button type="button" id="btn-proximo-edita-func" class="btn-primary">Próximo →</button>
        </div>
      </div>

      <div id="aba-login-edit" style="display: none;">
        <div class="form-grid">
          <div class="field full">
            <label>CPF (Login)</label>
            <input type="text" name="CPF" value="{{ funcionario.CPF }}" readonly style="background:#f0f0f0; cursor: not-allowed;" title="O CPF não pode ser alterado por segurança." />
          </div>

          <div class="field full">
            <label>Função no Sistema</label>
            {% if request.user.is_superuser %}
            <select name="FUNCAO">
              <option value="COMUM" {% if funcionario.FUNCAO == 'COMUM' %}selected{% endif %}>FUNCIONÁRIO COMUM (Apenas cadastra obras)</option>
              <option value="SUPERVISOR" {% if funcionario.FUNCAO == 'SUPERVISOR' %}selected{% endif %}>SUPERVISOR (Pode gerenciar funcionários)</option>
            </select>
            {% else %}
            <select name="FUNCAO">
              <option value="COMUM" selected>FUNCIONÁRIO COMUM (Apenas cadastra obras)</option>
            </select>
            {% endif %}
          </div>

          <div class="field full">
            <label>Nova Senha (deixe em branco para não alterar)</label>
            <input type="password" name="SENHA" placeholder="••••••••" autocomplete="new-password" />
          </div>
        </div>

        <div class="btn-row" style="margin-top: 1.25rem;">
          <button type="button" id="btn-voltar-edita-func" class="btn-ghost">← Voltar</button>
          <button type="button" id="btn-salvar-alteracoes" name="btn-salvar" class="btn-primary">
            <span class="texto-botao">Salvar Alterações</span>
            <div class="spinner-loading"></div>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<style>
  .tab-row {
    display: flex;
    border-bottom: 0.5px solid rgba(0,0,0,0.12);
    margin-bottom: 1.25rem;
    gap: 4px;
  }
  .tab-btn {
    flex: 1;
    padding: 9px 14px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #888;
    cursor: pointer;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn.tab-ativo {
    color: var(--btn-primary-color, #633806);
    border-bottom-color: var(--btn-primary-color, #633806);
  }
</style>

<!-- Modal de confirmação -->
<div id="modal-edita-func" style="display:none; position:fixed; inset:0; z-index:9999; align-items:center; justify-content:center;">
  <div id="modal-backdrop-edita-func" style="position:absolute; inset:0; background:rgba(0,0,0,0.45); backdrop-filter:blur(2px);"></div>
  <div style="position:relative; z-index:1; background:var(--dropdown-bg,#fff); border:1px solid var(--dropdown-divider,#eaf0f8); border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,0.18); padding:32px 28px 24px; max-width:420px; width:calc(100% - 32px); text-align:center;">
    <div style="width:48px; height:48px; border-radius:50%; background:var(--dropdown-icon-bg,#e8f1fb); display:flex; align-items:center; justify-content:center; margin:0 auto 16px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4589C8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"/>
        <path d="M12 8v4M12 16h.01"/>
      </svg>
    </div>
    <div style="font-size:1.1rem; font-weight:700; color:var(--dropdown-text,#2c4a6e); margin-bottom:8px;">Confirmar alterações</div>
    <div style="font-size:0.9rem; color:var(--welcome-text,#6b8aaa); line-height:1.5; margin-bottom:24px;">Verifique os dados antes de salvar. As alterações serão aplicadas imediatamente ao perfil do funcionário.</div>
    <div style="display:flex; gap:12px; justify-content:center;">
      <button id="btn-fechar-modal-edita-func" type="button" style="flex:1; padding:10px 0; border-radius:8px; font-size:0.95rem; font-weight:600; cursor:pointer; border:1px solid var(--dropdown-divider,#ddd); background:transparent; color:var(--dropdown-text,#2c4a6e);">Voltar e revisar</button>
      <button id="modal-confirmar-edita-func" type="button" style="flex:1; padding:10px 0; border-radius:8px; font-size:0.95rem; font-weight:600; cursor:pointer; border:none; background:#4589C8; color:#fff;">Confirmar alterações</button>
    </div>
  </div>
</div>
