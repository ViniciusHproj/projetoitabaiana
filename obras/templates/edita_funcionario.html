<div class="container" style="max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px;">{% include 'partial_messages.html' %}
    
    <h2>Editar Funcionário: {{ funcionario.NOME }}</h2>

    <div style="display: flex; border-bottom: 2px solid #ccc; margin-bottom: 20px;">
        <button type="button" id="btn-dados-edit" onclick="mostrarAbaEdit('dados')" style="flex: 1; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer;">Dados Pessoais</button>
        <button type="button" id="btn-login-edit" onclick="mostrarAbaEdit('login')" style="flex: 1; padding: 10px; background: #e9ecef; color: #333; border: none; cursor: pointer;">Dados de Login/Acesso</button>
    </div>

    <form hx-post="{% url 'salva_edicao_funcionario' %}" hx-target="#conteudo-dinamico" hx-indicator="#btn-salvar-alteracoes">
        {% csrf_token %}

        <input type="hidden" name="CPF_ORIGINAL" value="{{ funcionario.CPF }}">

        <div id="aba-dados-edit" style="display: block;">
            <label>Nome Completo:</label>
            <input type="text" name="NOME" value="{{ funcionario.NOME }}" style="width: 100%; margin-bottom: 15px; padding: 8px; text-transform: uppercase;">

            <label>Data de Nascimento:</label>
            <input type="date" name="DATA_NASCIMENTO" value="{{ funcionario.DATA_NASCIMENTO }}" style="width: 100%; margin-bottom: 15px; padding: 8px;">

            <label>RG:</label>
            <input type="text" name="RG" value="{{ funcionario.RG }}" maxlength="12" oninput="mascaraRG(this)" style="width: 100%; margin-bottom: 15px; padding: 8px;">
            
            <button type="button" onclick="mostrarAbaEdit('login')" style="padding: 10px; background: #28a745; color: white; border: none; cursor: pointer;">Próximo ➡️</button>
        </div>

        <div id="aba-login-edit" style="display: none;">
            <label>CPF (Login):</label>
            <input type="text" name="CPF" value="{{ funcionario.CPF }}" readonly style="width: 100%; margin-bottom: 15px; padding: 8px; background-color: #f0f0f0;" title="O CPF não pode ser alterado por segurança.">
            
            <label>Função no Sistema:</label>
            <select name="FUNCAO" style="width: 100%; margin-bottom: 15px; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                <option value="COMUM" {% if funcionario.FUNCAO == 'COMUM' %}selected{% endif %}>COMUM</option>
                <option value="SUPERVISOR" {% if funcionario.FUNCAO == 'SUPERVISOR' %}selected{% endif %}>SUPERVISOR</option>
            </select>
            
            <label>Nova Senha (Deixe em branco para NÃO alterar):</label>
            <input type="password" name="SENHA" placeholder="••••••••" style="width: 100%; margin-bottom: 15px; padding: 8px;">

            <button type="button" onclick="mostrarAbaEdit('dados')" style="padding: 10px; background: #6c757d; color: white; border: none; cursor: pointer;">⬅️ Voltar</button>
            <button type="submit" id="btn-salvar" name="btn-salvar" class="seu-css-do-botao" style="padding: 12px 24px !important; 
                   background-color: #007bff !important; 
                   color: white !important; 
                   border: none !important; 
                   border-radius: 6px !important; 
                   cursor: pointer !important; 
                   font-weight: 600 !important; 
                   font-size: 16px !important;
                   display: inline-flex !important; 
                   align-items: center !important; 
                   justify-content: center !important; 
                   gap: 10px !important;
                   transition: background-color 0.2s;">
                <span class="texto-botao">Salvar Alterações</span>
                <div class="spinner-loading"></div>
            </button>
        </div>
    </form>
</div>

<script>
    // Reaproveitando suas funções de máscara
    function mascaraCPF(input) {
        let v = input.value.replace(/\D/g, "");
        if (v.length <= 11) {
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        }
        input.value = v;
    }

    function mascaraRG(input) {
        let v = input.value.replace(/\D/g, "");
        if (v.length <= 9) {
            v = v.replace(/(\d{2})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1})$/, "$1-$2");
        }
        input.value = v;
    }

    function mostrarAbaEdit(aba) {
        if (aba === 'dados') {
            document.getElementById('aba-dados-edit').style.display = 'block';
            document.getElementById('aba-login-edit').style.display = 'none';
            document.getElementById('btn-dados-edit').style.background = '#007bff';
            document.getElementById('btn-dados-edit').style.color = 'white';
            document.getElementById('btn-login-edit').style.background = '#e9ecef';
            document.getElementById('btn-login-edit').style.color = '#333';
        } else {
            document.getElementById('aba-dados-edit').style.display = 'none';
            document.getElementById('aba-login-edit').style.display = 'block';
            document.getElementById('btn-login-edit').style.background = '#007bff';
            document.getElementById('btn-login-edit').style.color = 'white';
            document.getElementById('btn-dados-edit').style.background = '#e9ecef';
            document.getElementById('btn-dados-edit').style.color = '#333';
        }
    }
</script>
