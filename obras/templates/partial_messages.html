{% if messages %}
    <style>
        /* 1. Definimos as cores para cada tipo de situação */
        .msg-success { background-color: #d4edda; color: #155724; border-color: #c3e6cb; }
        .msg-error   { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .msg-warning { background-color: #fff3cd; color: #856404; border-color: #ffeeba; }
        .msg-info    { background-color: #d1ecf1; color: #0c5460; border-color: #bee5eb; }

        /* 2. O estilo padrão da bolinha (sem a cor de fundo) */
        .alerta-animado {
            padding: 15px 25px; 
            border: 1px solid transparent; 
            border-radius: 50px; 
            font-weight: bold; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
            gap: 10px;
            pointer-events: auto; /* Permite clicar na mensagem */
            animation: surgirESumir 4s ease-in-out forwards;
        }

        @keyframes surgirESumir {
            0% { opacity: 0; transform: translateY(-50px); }
            10% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>

    <div id="container-mensagens" style="position: fixed; top: 85px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; pointer-events: none;">
        
        {% for message in messages %}
            <div class="alerta-animado msg-{{ message.tags|default:'info' }}">
                {{ message }}
            </div>
        {% endfor %}

    </div>
{% endif %}
