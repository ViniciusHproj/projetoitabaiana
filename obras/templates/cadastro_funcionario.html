<div id="conteudo-dinamico">
  {% include 'partial_messages.html' %}

  <div class="wrap">
    <div class="card">
      <div class="header">
        <div class="header-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="6" r="3.5" fill="#854F0B" opacity=".8"/>
            <path d="M2 15c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" fill="none" opacity=".5"/>
          </svg>
        </div>
        <div>
          <div class="header-title">Cadastro de Funcionário</div>
          <div class="header-sub">Preencha os dados do funcionário a registrar</div>
        </div>
      </div>
      <div class="divider" style="margin-top: 0;"></div>
      <div class="tab-row">
        <button type="button" id="btn-dados" class="tab-btn tab-ativo" onclick="mostrarAba('dados')">Dados Pessoais</button>
        <button type="button" id="btn-login" class="tab-btn" onclick="mostrarAba('login')">Dados de Login</button>
      </div>

      <form hx-post="{% url 'cadastro_funcionario' %}" hx-target="#conteudo-dinamico" hx-swap="innerHTML" hx-indicator="#btn-salvar" hx-confirm="Confirma o cadastro deste funcionário?">
        {% csrf_token %}

        <div id="aba-dados">
          <div class="form-grid">
            <div class="field full">
              <label>Nome Completo</label>
              <input type="text" name="NOME" value="{{ dados.NOME|default:'' }}" placeholder="Digite o nome completo" />
            </div>

            <div class="field">
              <label>Data de Nascimento</label>
              <input type="date" name="DATA_NASCIMENTO" value="{{ dados.DATA_NASCIMENTO|default:'' }}" />
            </div>

            <div class="field">
              <label>RG</label>
              <input type="text" name="RG" value="{{ dados.RG|default:'' }}" maxlength="12" oninput="mascaraRG(this)" placeholder="00.000.000-0" />
            </div>
          </div>

          <div class="btn-row" style="margin-top: 1.25rem;">
            <button type="button" class="btn-primary" onclick="mostrarAba('login')">Próximo →</button>
          </div>
        </div>

        <div id="aba-login" style="display: none;">
          <div class="form-grid">
            <div class="field full">
              <label>CPF (Login)</label>
              <input type="text" name="CPF" value="{{ dados.CPF|default:'' }}" maxlength="14" oninput="mascaraCPF(this)" placeholder="000.000.000-00" />
            </div>

            <div class="field full">
              <label>Função no Sistema</label>
              <select name="NIVEL_ACESSO">
                <option value="COMUM" {% if dados.NIVEL_ACESSO == 'COMUM' %}selected{% endif %}>FUNCIONÁRIO COMUM (Apenas cadastra obras)</option>
                <option value="SUPERVISOR" {% if dados.NIVEL_ACESSO == 'SUPERVISOR' %}selected{% endif %}>SUPERVISOR (Pode cadastrar outros)</option>
              </select>
            </div>

            <div class="field full">
              <label>Senha</label>
              <input type="password" name="SENHA" />
            </div>
          </div>

          <div class="btn-row" style="margin-top: 1.25rem;">
            <button type="button" class="btn-ghost" onclick="mostrarAba('dados')">← Voltar</button>
            <button type="submit" id="btn-salvar" name="btn-salvar" class="btn-primary">
              <span class="texto-botao">Salvar Funcionário</span>
              <div class="spinner-loading"></div>
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<style>
  .tab-row {
    display: flex;
    border-bottom: 0.5px solid rgba(0,0,0,0.12);
    margin-bottom: 1.25rem;
    gap: 4px;
  }
  .tab-btn {
    flex: 1;
    padding: 9px 14px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #888;
    cursor: pointer;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn.tab-ativo {
    color: var(--btn-primary-color, #633806);
    border-bottom-color: var(--btn-primary-color, #633806);
  }
</style>

<script>
  {% if dados.CPF %}
    mostrarAba('login');
  {% endif %}

  function mascaraCPF(input) {
    let v = input.value.replace(/\D/g, "");
    if (v.length > 11) v = v.slice(0, 11);
    v = v.replace(/(\d{3})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
    input.value = v;
  }

  function mascaraRG(input) {
    let v = input.value.replace(/\D/g, "");
    v = v.replace(/(\d{2})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d{1})$/, "$1-$2");
    input.value = v;
  }

  function mostrarAba(aba) {
    const btnDados = document.getElementById('btn-dados');
    const btnLogin = document.getElementById('btn-login');
    const divDados = document.getElementById('aba-dados');
    const divLogin = document.getElementById('aba-login');

    if (aba === 'dados') {
      divDados.style.display = 'block';
      divLogin.style.display = 'none';
      btnDados.classList.add('tab-ativo');
      btnLogin.classList.remove('tab-ativo');
    } else {
      divDados.style.display = 'none';
      divLogin.style.display = 'block';
      btnLogin.classList.add('tab-ativo');
      btnDados.classList.remove('tab-ativo');
    }
  }
</script>
