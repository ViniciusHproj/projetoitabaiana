<div id="modal-galeria-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
    
    <div style="background: white; width: 90%; max-width: 800px; max-height: 90vh; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; position: relative;">
        
        <div style="padding: 15px 20px; background: #f8f9fa; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0; color: #333; font-size: 18px;">Galeria da Obra ID: {{ id_obra }}</h3>
            <button onclick="fecharModalGaleria()" style="background: none; border: none; font-size: 24px; font-weight: bold; color: #666; cursor: pointer; padding: 0;">&times;</button>
        </div>

        <div style="padding: 20px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
            {% for foto in fotos %}
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <img src="{{ foto.url }}" alt="Foto da Galeria"
                         onclick="abrirLightbox(this.src)"
                         style="width: 100%; height: 200px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 2px solid #eee; cursor: zoom-in;">
                    <p style="margin: 0; font-size: 13px; color: #444; text-align: center; font-weight: bold; background: #f8f9fa; padding: 5px; border-radius: 4px; border: 1px solid #ddd;">
                        Data: {{ foto.data }}
                    </p>
                </div>
            {% empty %}
                <p style="text-align: center; color: #666; grid-column: 1 / -1;">Nenhuma imagem encontrada nesta galeria.</p>
            {% endfor %}
        </div>
    </div>
</div>

<script>
    function _fecharComEscape(e) {
        if (e.key === 'Escape') fecharModalGaleria();
    }

    function fecharModalGaleria() {
        document.removeEventListener('keydown', _fecharComEscape);
        document.getElementById('container-modal-galeria').innerHTML = '';
    }

    document.getElementById('modal-galeria-overlay').addEventListener('click', function(e) {
        if(e.target === this) {
            fecharModalGaleria();
        }
    });

    // { once: true } garante que no máximo um listener esteja ativo por vez,
    // mesmo que HTMX reinjecte o fragmento sem fechar o modal anterior.
    document.addEventListener('keydown', _fecharComEscape, { once: true });

    function abrirLightbox(src) {
        // Remove o listener do modal antes de abrir o lightbox, para que
        // Escape feche apenas o lightbox — não o modal inteiro simultaneamente.
        document.removeEventListener('keydown', _fecharComEscape);

        const lb = document.createElement('div');
        lb.id = 'lightbox-fullscreen';
        lb.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:10000;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';

        const img = document.createElement('img');
        img.src = src;
        img.style.cssText = 'max-width:90%;max-height:90vh;border-radius:6px;object-fit:contain;box-shadow:0 0 40px rgba(0,0,0,0.8);';
        lb.appendChild(img);

        function _fecharLightbox() {
            document.removeEventListener('keydown', _escapeDoLightbox);
            lb.remove();
            // Restaura o listener do modal depois que o lightbox fecha.
            document.addEventListener('keydown', _fecharComEscape, { once: true });
        }

        function _escapeDoLightbox(e) {
            if (e.key === 'Escape') _fecharLightbox();
        }

        lb.addEventListener('click', _fecharLightbox);
        document.addEventListener('keydown', _escapeDoLightbox);
        document.body.appendChild(lb);
    }
</script>
