{% include 'partial_messages.html' %}

<div class="container" style="padding: 40px 20px; max-width: 500px; margin: 40px auto; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    <h3 style="color: #007bff; margin-bottom: 10px; text-align: center;">Atualizar Obra</h3>
    <p style="text-align: center; color: #6c757d; margin-bottom: 25px;">Digite o ID da obra que deseja editar.</p>

    <form hx-post="{% url 'busca_atualiza_obra' %}" 
          hx-target="#conteudo-dinamico" 
          hx-swap="innerHTML">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            <label style="font-weight: bold; color: #333; display: block; margin-bottom: 8px;">ID da Obra:</label>
            <input type="text" 
                   name="ID_OBRA" 
                   required 
                   placeholder="Ex: 112025" 
                   style="width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 16px; box-sizing: border-box;">
        </div>
        
        <button type="submit" style="width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s;">
            🔍 Buscar Obra
        </button>
    </form>
</div>
