{% include 'partial_messages.html' %}

<div class="wrap">
  <div class="card">
    <div class="header">
      <div class="header-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="10" width="14" height="6" rx="1" fill="#854F0B" />
          <rect x="5" y="5" width="8" height="6" rx="1" fill="#854F0B" opacity=".6" />
          <rect x="8" y="2" width="2" height="4" rx="1" fill="#854F0B" opacity=".4" />
        </svg>
      </div>
      <div>
        <div class="header-title">Atualização de Obras</div>
        <div class="header-sub">Digite o ID da obra que deseja editar</div>
      </div>
    </div>
    <div class="divider" style="margin-top: 0;"></div>

    <form hx-post="{% url 'busca_atualiza_obra' %}"
          hx-target="#conteudo-dinamico"
          hx-swap="innerHTML"
          hx-indicator="#btn-buscar-obra">
      {% csrf_token %}

      <div class="form-grid">
        <div class="field full">
          <label>ID da Obra</label>
          <input type="text" name="ID_OBRA" required placeholder="Ex: 112025" />
        </div>
      </div>

      <div class="btn-row">
        <button type="submit" id="btn-buscar-obra" class="btn-primary">
          <span class="texto-botao">Buscar Obra</span>
          <div class="spinner-loading"></div>
        </button>
      </div>
    </form>
  </div>
</div>
