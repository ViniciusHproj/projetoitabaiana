{% include 'partial_messages.html' %}

<div class="container" style="padding: 40px 20px; max-width: 500px; margin: 40px auto; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    <h3 style="color: #007bff; margin-bottom: 10px; text-align: center;">Atualizar Funcionário</h3>
    <p style="text-align: center; color: #6c757d; margin-bottom: 25px;">Digite o CPF do funcionário que deseja editar.</p>

    <form hx-post="{% url 'busca_atualiza_funcionario' %}" 
          hx-target="#conteudo-dinamico" 
          hx-swap="innerHTML">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            <label style="font-weight: bold; color: #333; display: block; margin-bottom: 8px;">CPF do Funcionário:</label>
            
            <input type="text" 
                   name="CPF" 
                   required 
                   placeholder="000.000.000-00" 
                   maxlength="14" 
                   oninput="mascaraCPF(this)"
                   style="width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 16px; box-sizing: border-box;">
        </div>
        
        <button type="submit" style="width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.3s;">
            🔍 Buscar Funcionário
        </button>
    </form>
</div>

<script>
    // Função de máscara movida para dentro do arquivo para garantir que funcione após o Swap do HTMX
    function mascaraCPF(input) {
        let v = input.value.replace(/\D/g, ""); 
        if (v.length > 11) v = v.slice(0, 11);
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        input.value = v;
    }
</script>
