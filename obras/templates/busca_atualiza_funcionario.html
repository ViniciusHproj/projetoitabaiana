{% include 'partial_messages.html' %}

<div class="wrap">
  <div class="card">
    <div class="header">
      <div class="header-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="6" r="3.5" fill="#854F0B" opacity=".8"/>
          <path d="M2 15c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" fill="none" opacity=".5"/>
        </svg>
      </div>
      <div>
        <div class="header-title">Atualização de Funcionário</div>
        <div class="header-sub">Digite o CPF do funcionário que deseja editar</div>
      </div>
    </div>
    <div class="divider" style="margin-top: 0;"></div>

    <form hx-post="{% url 'busca_atualiza_funcionario' %}"
          hx-target="#conteudo-dinamico"
          hx-swap="innerHTML"
          hx-indicator="#btn-buscar-funcionario">
      {% csrf_token %}

      <div class="form-grid">
        <div class="field full">
          <label>CPF do Funcionário</label>
          <input type="text" name="CPF" required placeholder="000.000.000-00" maxlength="14" oninput="mascaraCPF(this)" />
        </div>
      </div>

      <div class="btn-row">
        <button type="submit" id="btn-buscar-funcionario" class="btn-primary">
          <span class="texto-botao">Buscar Funcionário</span>
          <div class="spinner-loading"></div>
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  function mascaraCPF(input) {
    let v = input.value.replace(/\D/g, "");
    if (v.length > 11) v = v.slice(0, 11);
    v = v.replace(/(\d{3})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
    input.value = v;
  }
</script>
